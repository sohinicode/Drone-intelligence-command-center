name: DICC CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: |
          npm install
          npm run install:all

      - name: Run Backend Tests
        run: |
          npm run test --prefix backend

      - name: Run Frontend Tests
        run: |
          npm run test --prefix frontend

  build-docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend Docker Image
        run: |
          docker build -t dicc-backend:latest -f Dockerfile.backend ./backend

      - name: Build Frontend Docker Image
        run: |
          docker build -t dicc-frontend:latest -f Dockerfile.frontend ./frontend

      - name: Simulated Deployment
        run: |
          echo "Images built successfully. Deploying to production environments (Staging/Render/Vercel)..."
          echo "Deployment steps complete."
