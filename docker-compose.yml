version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: dicc-postgres
    environment:
      POSTGRES_USER: dicc_admin
      POSTGRES_PASSWORD: dicc_password
      POSTGRES_DB: dicc_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dicc_admin -d dicc_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:latest
    container_name: dicc-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.adminCommand(\"ping\")' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dicc-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: dicc-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://dicc_admin:dicc_password@postgres:5432/dicc_dev
      - MONGODB_URI=mongodb://mongodb:27017/dicc_dev
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=super_secret_access_key_12345
      - JWT_REFRESH_SECRET=super_secret_refresh_key_54321
      - AWS_ACCESS_KEY_ID=mock_key
      - AWS_SECRET_ACCESS_KEY=mock_secret
      - AWS_S3_BUCKET=dicc-assets
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: dicc-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  mongodata:
  redisdata:
